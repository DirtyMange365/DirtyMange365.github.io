<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
    <style>
        /* 设置全屏大小的背景图片 */
        body {
            background-image: url(https://images.unsplash.com/photo-1485612482149-d92b1b43f781?ixlib=rb-1.2.1&auto=format&fit=crop&w=1500&q=80);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
        }
        
        /* 设置内容居中显示 */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* 设置标题的样式 */
        h1 {
            font-size: 3rem;
            color: white;
            text-align: center;
            text-shadow: 2px 2px 5px black;
        }
        
        /* 设置按钮的样式 */
        button {
            border: none;
            padding: 10px 20px;
            background-color: #ff9b9b;
            color: white;
            border-radius: 3px;
            font-size: 1.2rem;
            cursor: pointer;
            text-shadow: 1px 1px 2px black;
            transition: all 0.3s ease-in-out;
        }
        
        button:hover {
            background-color: #ff6666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Hello! I'm DirtyMange365.</h1>
            <button><a href="\BLOG\BLOG.html">START</a></button>
        </div>
    </div>
</body>
</html>
